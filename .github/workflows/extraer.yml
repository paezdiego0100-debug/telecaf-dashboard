name: Extraer Tickets Pendientes

on:
  schedule:
    - cron: '0 11 * * 1-5'
    - cron: '0 17 * * 1-5'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  extraer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Playwright
        run: npx playwright install chromium --with-deps

      - name: Preparar carpeta de datos
        run: mkdir -p datos

      - name: Extraer tickets
        env:
          SC_USUARIO: ${{ secrets.SC_USUARIO }}
          SC_PASSWORD: ${{ secrets.SC_PASSWORD }}
          HEADLESS: 'true'
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scraper.js
